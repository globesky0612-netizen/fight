<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightFinder - 機票搜尋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-900">

    <header class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide"><i class="fa-solid fa-plane-departure mr-2"></i>FlightFinder</h1>
            <nav class="space-x-4 hidden md:block">
                <a href="#" class="hover:text-blue-200"><i class="fa-regular fa-bell mr-1"></i>低價追蹤</a>
                <a href="#" class="hover:text-blue-200"><i class="fa-regular fa-user mr-1"></i>我的行程</a>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <section class="bg-white rounded-2xl shadow-xl p-6 md:p-8 mb-8 border border-gray-100">
            <div class="flex space-x-4 mb-6">
                <button class="bg-blue-50 text-blue-600 font-semibold px-4 py-2 rounded-full border border-blue-200 text-sm">單程 / 來回</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="relative border border-gray-300 rounded-xl p-3 focus-within:border-blue-500 transition">
                    <label class="block text-xs font-semibold text-gray-500 uppercase">出發地 (輸入代碼)</label>
                    <div class="flex items-center mt-1">
                        <i class="fa-solid fa-location-dot text-gray-400 mr-2"></i>
                        <input type="text" value="台北 (TPE)" class="w-full bg-transparent focus:outline-none font-medium">
                    </div>
                </div>

                <div class="relative border border-gray-300 rounded-xl p-3 focus-within:border-blue-500 transition opacity-50 cursor-not-allowed">
                    <label class="block text-xs font-semibold text-gray-500 uppercase">目的地 (探索全球特價)</label>
                    <div class="flex items-center mt-1">
                        <i class="fa-solid fa-earth-americas text-gray-400 mr-2"></i>
                        <input type="text" value="Anywhere" disabled class="w-full bg-transparent focus:outline-none font-medium">
                    </div>
                </div>

                <div class="relative border border-gray-300 rounded-xl p-3 focus-within:border-blue-500 transition">
                    <label class="block text-xs font-semibold text-gray-500 uppercase">出發日期 (選填)</label>
                    <div class="flex items-center mt-1">
                        <i class="fa-regular fa-calendar text-gray-400 mr-2"></i>
                        <input type="date" id="depart-date" class="w-full bg-transparent focus:outline-none font-medium text-sm text-gray-700">
                    </div>
                </div>

                <div class="relative border border-gray-300 rounded-xl p-3 focus-within:border-blue-500 transition">
                    <label class="block text-xs font-semibold text-gray-500 uppercase">旅客 / 艙等</label>
                    <div class="flex items-center mt-1">
                        <i class="fa-solid fa-users text-gray-400 mr-2"></i>
                        <input type="text" value="1位成人, 經濟艙" class="w-full bg-transparent focus:outline-none font-medium text-sm" readonly>
                    </div>
                </div>
            </div>

            <div class="mt-6 flex justify-end">
                <button class="w-full md:w-auto bg-orange-500 hover:bg-orange-600 text-white font-bold px-8 py-4 rounded-xl shadow-lg shadow-orange-500/20 transition duration-150 flex items-center justify-center space-x-2">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span>搜尋航班</span>
                </button>
            </div>
        </section>

        <section>
            <h3 class="text-xl font-bold mb-6 flex items-center">
                <i class="fa-solid fa-fire text-red-500 mr-2"></i>即時特價航線
            </h3>
            
            <div id="flight-results" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="col-span-3 text-center py-10">
                    <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
                    <p class="text-gray-500 font-medium">系統準備中...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resultsContainer = document.getElementById('flight-results');
            const searchBtn = document.querySelector('button.bg-orange-500'); 
            
            // 抓取出發地與日期輸入框
            const inputs = document.querySelectorAll('input');
            const originInput = inputs[0]; 
            const dateInput = document.getElementById('depart-date'); 
            
            // 您的推廣 ID (測試期間可維持預設值)
            const myMarker = "123456"; 

            // ✈️ 機場代碼與中文名稱對照字典
            const airportDict = {
                "TPE": "台北", "TSA": "台北(松山)", "KHH": "高雄", "RMQ": "台中",
                "NRT": "東京(成田)", "HND": "東京(羽田)", "KIX": "大阪(關西)",
                "OKA": "沖繩", "CTS": "札幌", "FUK": "福岡", "NGO": "名古屋",
                "ICN": "首爾(仁川)", "GMP": "首爾(金浦)", "PUS": "釜山",
                "BKK": "曼谷(蘇凡納布)", "DMK": "曼谷(廊曼)", "CNX": "清邁",
                "SIN": "新加坡", "HKG": "香港", "MFM": "澳門",
                "MNL": "馬尼拉", "CEB": "宿霧", "KUL": "吉隆坡", "PEN": "檳城",
                "SGN": "胡志明市", "HAN": "河內", "DAD": "峴港",
                "LAX": "洛杉磯", "SFO": "舊金山", "JFK": "紐約", "YVR": "溫哥華",
                "LHR": "倫敦", "CDG": "巴黎", "FRA": "法蘭克福", "AMS": "阿姆斯特丹",
                "SYD": "雪梨", "MEL": "墨爾本", "BNE": "布里斯本", "AKL": "奧克蘭",
                "DXB": "杜拜", "IST": "伊斯坦堡"
            };

            // 翻譯函數
            function getCityName(code) {
                return airportDict[code] || code;
            }

            // 搜尋資料的主邏輯
            function fetchFlights(originCode, searchDate) {
                const originName = getCityName(originCode);
                
                // 顯示載入中動畫
                resultsContainer.innerHTML = `
                    <div class="col-span-3 text-center py-10">
                        <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
                        <p class="text-gray-500 font-medium">正在搜尋 ${originName} 出發的特價航班...</p>
                    </div>
                `;

                // 準備 API 請求網址
                let apiUrl = `/api/search-flights?origin=${originCode}`;
                if (searchDate) {
                    apiUrl += `&date=${searchDate}`;
                }

                fetch(apiUrl)
                    .then(response => response.json())
                    .then(flights => {
                        if (flights.message) {
                            resultsContainer.innerHTML = `<p class="text-gray-500 col-span-3 text-center py-10 bg-white rounded-xl shadow">${flights.message}</p>`;
                            return;
                        }

                        // 清空畫面
                        resultsContainer.innerHTML = '';
                        
                        // 只取前 6 筆顯示
                        const topFlights = flights.slice(0, 6);

                        topFlights.forEach(flight => {
                            const destCode = flight.destination; 
                            const destName = getCityName(destCode); 
                            const price = flight.value; 
                            const departureDate = flight.depart_date; 
                            const provider = flight.gate || "超值特惠";
                            
                            // 組裝分潤連結
                            const checkoutUrl = `https://search.aviasales.com/flights/?origin=${originCode}&destination=${destCode}&marker=${myMarker}`;

                            // 產生單張卡片的 HTML
                            const cardHTML = `
                                <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300 border border-gray-100 flex flex-col justify-between">
                                    <div class="p-5">
                                        <div class="flex justify-between items-center mb-4">
                                            <span class="font-extrabold text-2xl text-blue-800">${destName}</span>
                                            <span class="text-xs bg-green-50 text-green-600 px-2 py-1 rounded font-semibold border border-green-100">
                                                售票: ${provider}
                                            </span>
                                        </div>
                                        <div class="mb-2">
                                            <p class="text-gray-500 text-sm mb-1"><i class="fa-regular fa-calendar mr-2"></i>出發: ${departureDate}</p>
                                            <p class="font-bold text-lg text-gray-800 flex items-center">
                                                ${originName} 
                                                <i class="fa-solid fa-plane mx-2 text-gray-400 text-sm"></i> 
                                                ${destName}
                                            </p>
                                        </div>
                                    </div>
                                    <div class="bg-gray-50 p-5 border-t border-gray-100 flex justify-between items-center">
                                        <div>
                                            <span class="block text-gray-400 text-xs mb-1">含稅總價</span>
                                            <span class="text-2xl font-black text-orange-600">NT$ ${price.toLocaleString()}</span>
                                        </div>
                                        <a href="${checkoutUrl}" target="_blank" rel="noopener noreferrer" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded-lg shadow transition">
                                            搶票去
                                        </a>
                                    </div>
                                </div>
                            `;
                            resultsContainer.innerHTML += cardHTML;
                        });
                    })
                    .catch(error => {
                        console.error('前端錯誤:', error);
                        resultsContainer.innerHTML = `<p class="text-red-500 col-span-3 text-center py-10 bg-white rounded-xl shadow">無法載入航班資料，請確認後端伺服器已正確啟動。</p>`;
                    });
            }

            // 網頁初次載入時自動搜尋台北出發的航班
            fetchFlights("TPE", "");

            // 監聽按鈕點擊事件
            searchBtn.addEventListener('click', () => {
                const rawOrigin = originInput.value;
                const match = rawOrigin.match(/[A-Za-z]{3}/); 
                const selectedDate = dateInput.value; 
                
                if (match) {
                    const originCode = match[0].toUpperCase();
                    fetchFlights(originCode, selectedDate);
                } else {
                    alert("請在出發地輸入包含 3 碼的英文機場代碼 (例如: TPE, KIX, ICN)");
                }
            });
        });
    </script>
</body>
</html>
